<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitMenu - Menús semanales personalizados</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- jsPDF Library (Needed for PDF Export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Main Application Script -->
  <script src="app.js" defer></script>
</head>
<body>

<header class="glass sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-2">
    <i class="fa-solid fa-bowl-food gradient-icon text-3xl"></i>
    <h1 class="text-3xl font-bold bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">FitMenu</h1>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">

  <section class="text-center mb-10 fade-in">
    <h2 class="text-4xl md:text-5xl font-bold text-slate-800 mb-3">
      Tu <span class="gradient-text">menú semanal</span> en un clic
    </h2>
    <p class="text-slate-600 max-w-2xl mx-auto">
      Genera menús equilibrados, recetas paso a paso y tu lista de la compra automáticamente.
    </p>
  </section>

  <section class="glass rounded-3xl p-6 md:p-8 shadow-lg mb-8 fade-in">
    <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
      <i class="fa-solid fa-sliders text-emerald-500"></i>
      Configura tu menú
    </h3>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          <i class="fa-solid fa-users text-emerald-500 mr-1"></i> Número de personas
        </label>
        <input id="inp-persons" type="number" min="1" max="20" value="2" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          <i class="fa-solid fa-calendar-day text-emerald-500 mr-1"></i> Día de inicio
        </label>
        <select id="inp-startday" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white">
          <option value="lunes">Lunes</option>
          <option value="martes">Martes</option>
          <option value="miércoles">Miércoles</option>
          <option value="jueves">Jueves</option>
          <option value="viernes">Viernes</option>
          <option value="sábado">Sábado</option>
          <option value="domingo">Domingo</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          <i class="fa-solid fa-coins text-emerald-500 mr-1"></i> Presupuesto (€)
        </label>
        <input id="inp-budget" type="number" min="10" value="60" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          <i class="fa-solid fa-clock text-emerald-500 mr-1"></i> Tiempo máx. por comida (min)
        </label>
        <input id="inp-time" type="number" min="10" value="45" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          <i class="fa-solid fa-cart-shopping text-emerald-500 mr-1"></i> Supermercado habitual
        </label>
        <select id="inp-super" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white">
          <option value="cualquiera">Cualquiera</option>
          <option value="mercadona">Mercadona</option>
          <option value="carrefour">Carrefour</option>
          <option value="lidl">Lidl</option>
          <option value="aldia">Aldi</option>
          <option value="eroski">Eroski</option>
          <option value="diaz">Día</option>
        </select>
      </div>

      <div class="md:col-span-2 lg:col-span-1">
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          <i class="fa-solid fa-heart text-emerald-500 mr-1"></i> Preferencias alimentarias
        </label>
        <select id="inp-pref" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white">
          <option value="ninguna">Sin restricciones</option>
          <option value="vegetariana">Vegetariana</option>
          <option value="vegana">Vegana</option>
          <option value="sin-gluten">Sin gluten</option>
          <option value="sin-lactosa">Sin lactosa</option>
          <option value="keto">Keto / Baja en carbohidratos</option>
          <option value="paleo">Paleo</option>
        </select>
      </div>

      <div class="md:col-span-2 lg:col-span-3">
        <label class="block text-sm font-semibold text-slate-700 mb-1">
          <i class="fa-solid fa-ban text-rose-500 mr-1"></i> Alimentos que no quieres usar
        </label>
        <div class="flex gap-2">
          <input id="inp-exclude" type="text" placeholder="Ej: setas, brócoli, marisco..." class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 bg-white" />
          <button id="btn-add-exclude" class="px-4 py-2.5 rounded-xl bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div id="exclude-chips" class="mt-2 flex flex-wrap"></div>
      </div>
    </div>

    <!-- MODO FIT CON TOGGLE FUNCIONAL -->
    <div class="mt-8 p-5 rounded-2xl bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-200">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <div class="flex items-center gap-3">
          <i class="fa-solid fa-dumbbell text-emerald-600 text-xl"></i>
          <div>
            <h4 class="font-bold text-slate-800">Modo Fit</h4>
            <p class="text-sm text-slate-600">Activa para controlar macros y objetivos fitness</p>
          </div>
        </div>
        
        <!-- Toggle Switch Funcional -->
        <label class="toggle-container">
          <input type="checkbox" id="fit-toggle-checkbox" class="toggle-input" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Campos del Modo Fit (ocultos por defecto) -->
      <div id="fit-fields" class="hidden mt-6 pt-6 border-t border-emerald-200">
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
          
          <div class="fit-field bg-white rounded-xl p-4 shadow-sm border border-emerald-100">
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2">
              <i class="fa-solid fa-fire-flame-curved text-orange-500"></i>
              Calorías diarias (kcal)
            </label>
            <input id="fit-cal" type="number" value="2000" class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50" />
          </div>

          <div class="fit-field bg-white rounded-xl p-4 shadow-sm border border-emerald-100">
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2">
              <i class="fa-solid fa-drumstick-bite text-rose-500"></i>
              Proteínas (g)
            </label>
            <input id="fit-protein" type="number" value="150" class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50" />
          </div>

          <div class="fit-field bg-white rounded-xl p-4 shadow-sm border border-emerald-100">
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2">
              <i class="fa-solid fa-bread-slice text-amber-500"></i>
              Carbohidratos (g)
            </label>
            <input id="fit-carbs" type="number" value="200" class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50" />
          </div>

          <div class="fit-field bg-white rounded-xl p-4 shadow-sm border border-emerald-100">
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2">
              <i class="fa-solid fa-droplet text-sky-500"></i>
              Grasas (g)
            </label>
            <input id="fit-fat" type="number" value="65" class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50" />
          </div>

          <div class="fit-field bg-white rounded-xl p-4 shadow-sm border border-emerald-100">
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2">
              <i class="fa-solid fa-utensils text-purple-500"></i>
              Comidas al día
            </label>
            <select id="fit-meals" class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50">
              <option value="3">3 comidas</option>
              <option value="4" selected>4 comidas</option>
              <option value="5">5 comidas</option>
            </select>
          </div>

          <div class="fit-field bg-white rounded-xl p-4 shadow-sm border border-emerald-100">
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2">
              <i class="fa-solid fa-bullseye text-emerald-500"></i>
              Objetivo
            </label>
            <select id="fit-goal" class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50">
              <option value="perder">Perder grasa</option>
              <option value="mantener" selected>Mantener</option>
              <option value="ganar">Ganar músculo</option>
            </select>
          </div>

        </div>
      </div>
    </div>

    <div class="mt-8 text-center">
      <button id="btn-generate" class="px-8 py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold text-lg shadow-lg hover:shadow-xl hover:scale-105 transition-all">
        <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>
        Generar menú semanal
      </button>
    </div>
  </section>

  <section id="results-section" class="hidden fade-in">
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <h3 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
        <i class="fa-solid fa-utensils text-emerald-500"></i>
        Tu menú generado
      </h3>
      <div class="flex gap-2 flex-wrap">
        <button id="btn-pdf" class="px-4 py-2 rounded-xl bg-rose-500 text-white font-medium hover:bg-rose-600 transition">
          <i class="fa-solid fa-file-pdf mr-1"></i> Exportar PDF
        </button>
        <button id="btn-copy" class="px-4 py-2 rounded-xl bg-sky-500 text-white font-medium hover:bg-sky-600 transition">
          <i class="fa-solid fa-copy mr-1"></i> Copiar lista
        </button>
      </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-6">
      <button class="tab-btn active px-5 py-2.5 rounded-xl font-semibold text-sm bg-white text-slate-700 shadow" data-tab="menu">
        <i class="fa-solid fa-calendar-week mr-1"></i> Menú
      </button>
      <button class="tab-btn px-5 py-2.5 rounded-xl font-semibold text-sm bg-white text-slate-700 shadow" data-tab="recipes">
        <i class="fa-solid fa-book-open mr-1"></i> Recetas
      </button>
      <button class="tab-btn px-5 py-2.5 rounded-xl font-semibold text-sm bg-white text-slate-700 shadow" data-tab="macros">
        <i class="fa-solid fa-chart-pie mr-1"></i> Macros
      </button>
      <button class="tab-btn px-5 py-2.5 rounded-xl font-semibold text-sm bg-white text-slate-700 shadow" data-tab="shopping">
        <i class="fa-solid fa-basket-shopping mr-1"></i> Lista de compra
      </button>
      <button class="tab-btn px-5 py-2.5 rounded-xl font-semibold text-sm bg-white text-slate-700 shadow" data-tab="cost">
        <i class="fa-solid fa-euro-sign mr-1"></i> Coste
      </button>
    </div>

    <div id="tab-content" class="glass rounded-3xl p-6 md:p-8 shadow-lg min-h-[400px]"></div>
  </section>

</main>

<footer class="text-center py-6 text-slate-500 text-sm">
  <p> FitMenu · Digloff . Hecho con cariño para comer mejor</p>
</footer>

</body>
</html>
